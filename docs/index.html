<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MA 時事日報</title>
  <style>
    :root { --accent: #42A5F5; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif; background:#000; color:#E3F2FD; min-height:100vh; position:relative; overflow-x:hidden; }
    .bg-glow { position:fixed; bottom:-20%%; right:-20%%; width:70%%; height:70%%; background:radial-gradient(circle,#1A3A52 0%%,#0A1929 40%%,transparent 80%%); opacity:0.6; filter:blur(80px); z-index:-2; }
    .geo-lines { position:fixed; top:0;left:0;right:0;bottom:0; background-image:linear-gradient(90deg,transparent 49%%,#42A5F5 50%%,transparent 51%%),linear-gradient(0deg,transparent 49%%,#42A5F5 50%%,transparent 51%%); background-size:200px 200px; opacity:0.04; z-index:-1; }
    .container { max-width:680px; margin:0 auto; padding:60px 20px; position:relative; z-index:1; }
    h1 { font-size:36px; font-weight:700; color:#fff; text-align:center; margin-bottom:8px; }
    .sub { text-align:center; color:#B0BEC5; font-size:14px; margin-bottom:40px; }
    ul { list-style:none; }
    li { padding:18px 24px; background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.10); border-radius:12px; margin-bottom:10px; transition:all 0.3s; }
    li:hover { background:rgba(255,255,255,0.08); border-color:#42A5F5; transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.3); }
    a { color:#42A5F5; text-decoration:none; font-size:17px; font-weight:500; }
    a:hover { opacity:0.7; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="geo-lines"></div>
  <div class="container">
    <h1>MA 時事日報</h1>
    <p class="sub">共 1 期</p>
    <ul><li><a href="2026-03-30.html">2026-03-30</a></li>
</ul>
  </div>
</body>
</html>
